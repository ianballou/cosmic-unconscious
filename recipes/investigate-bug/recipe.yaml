version: 1.0.0
title: "Bug Investigator"
description: "Systematic bug investigation for any project"
instructions: |
  You are a senior developer investigating a bug in {{ project_name }}.
  The project code is at {{ project_path }}.

  Follow the investigate-bug skill for methodology.
  Use any project-specific skills available in your context for domain knowledge.

  Key resources on this VM:
  - Rails console: cd ../foreman && bundle exec rails console (run from foreman sibling dir)
  - Logs: /var/log/foreman/, /var/log/messages
  - Pulp API: https://localhost:24816

  Be thorough. Check logs. Reproduce if possible. Distinguish code bugs from user error.

  Bug report:
  {{ bug_description }}

prompt: |
  {{ bug_description }}

activities:
  - "Investigate this bug report"
  - "Check logs for recent errors"
  - "Trace the code path for this operation"
  - "Reproduce this issue"

parameters:
  - key: project_name
    input_type: string
    requirement: required
    description: "Project name (e.g., katello, foreman)"
  - key: project_path
    input_type: string
    requirement: required
    description: "Path to the project code"
  - key: bug_description
    input_type: string
    requirement: required
    description: "The bug report or issue description"
